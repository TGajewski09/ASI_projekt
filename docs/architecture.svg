      <text x="490" y="332" text-anchor="middle">AutoML</text>
      <text x="490" y="348" text-anchor="middle" font-size="11" fill="#666">AutoGluon</text>
    </g>
    <g>
      <rect x="640" y="240" width="160" height="52" rx="8" fill="#d5e8d4" stroke="#82b366"/>
