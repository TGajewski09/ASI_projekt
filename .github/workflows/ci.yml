# CI - Continuous Integration
# Na kazdy push i pull request: sprawdza styl kodu (ruff) i uruchamia testy (pytest).
name: CI

on: [push, pull_request]

jobs:
  test:
    name: Linting i testy
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Ustawienie Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalacja zaleznosci
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-cov ruff

      - name: Linting (ruff)
        run: ruff check .

      - name: Testy (pytest)
        env:
          KEDRO_DISABLE_TELEMETRY: "1"
        run: pytest
