# CD - Continuous Deployment
# Po wejsciu zmian na galaz main buduje obraz Docker z API i publikuje go
# w GitHub Container Registry (GHCR). Obraz jest gotowy do uruchomienia.
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    name: Budowa i publikacja obrazu Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Nazwa obrazu malymi literami
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/temperature-api" >> "$GITHUB_ENV"

      - name: Konfiguracja Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Budowa i publikacja obrazu
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
