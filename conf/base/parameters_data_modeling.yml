test_size: 0.2
random_state: 42

features:
  - year
  - month
  - Latitude
  - Longitude
  - country_code

engineered_features:
  - year
  - month
  - decade
  - abs_latitude
  - country_label

tuning_sample_size: 100000
tuning_n_iter: 8
tuning_cv: 3

target: AverageTemperature

linear_regression:
  type: LinearRegression
  n_jobs: -1

random_forest:
  type: RandomForestRegressor
  n_estimators: 100
  max_depth: 15
  random_state: 42
  n_jobs: -1
